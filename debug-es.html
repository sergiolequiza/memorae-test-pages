<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="content-language" content="es">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorae – Debug ES</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .top { display: flex; gap: 16px; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 400px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    .badge { display: inline-block; background: #5b4fcf; color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; }
    h1 { font-size: 18px; color: #1a1a2e; margin-bottom: 8px; }
    p  { font-size: 14px; color: #555; line-height: 1.5; margin-bottom: 8px; }
    #debug-panel {
      position: fixed; bottom: 0; left: 0; right: 0; height: 45vh;
      background: #1e1e1e; color: #d4d4d4; font-family: "SF Mono", Monaco, Consolas, monospace;
      font-size: 11px; overflow-y: auto; padding: 8px 12px; z-index: 999999;
      border-top: 3px solid #5b4fcf;
    }
    #debug-panel .log-entry { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    #debug-panel .log-type { font-weight: bold; }
    #debug-panel .log-type.req { color: #569cd6; }
    #debug-panel .log-type.res { color: #4ec9b0; }
    #debug-panel .log-type.ws-out { color: #ce9178; }
    #debug-panel .log-type.ws-in { color: #b5cea8; }
    #debug-panel .log-type.info { color: #dcdcaa; }
    #debug-panel .log-type.err { color: #f44747; }
    #debug-panel .log-time { color: #888; }
    #debug-panel .log-url { color: #9cdcfe; word-break: break-all; }
    #debug-panel .log-body { color: #d4d4d4; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto; }
    .controls { position: fixed; bottom: 45vh; left: 0; right: 0; background: #2d2d2d; padding: 4px 12px; z-index: 999999; display: flex; gap: 8px; }
    .controls button { background: #5b4fcf; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .controls button:hover { background: #4a3fb8; }
    .controls .count { color: #888; font-size: 11px; line-height: 24px; margin-left: auto; font-family: monospace; }
  </style>
</head>
<body>
  <div class="top">
    <div class="card">
      <div class="badge">DEBUG MODE</div>
      <h1>Memorae – Debug ES</h1>
      <p>All network traffic to/from Zoho SalesIQ is being captured below.</p>
      <p>Open the chat and interact. Every request, response, and WebSocket message will be logged.</p>
    </div>
  </div>

  <div class="controls">
    <button onclick="clearLog()">Clear</button>
    <button onclick="copyLog()">Copy All</button>
    <button onclick="downloadLog()">Download</button>
    <span class="count" id="log-count">0 entries</span>
  </div>
  <div id="debug-panel"></div>

  <script>
    // ============================================================
    // DEBUG INTERCEPTOR — captures all Zoho SalesIQ traffic
    // ============================================================
    const panel = document.getElementById('debug-panel');
    const logEntries = [];
    let entryCount = 0;

    function ts() {
      return new Date().toISOString().substr(11, 12);
    }

    function addLog(type, title, body) {
      entryCount++;
      const entry = { type, title, body, time: ts() };
      logEntries.push(entry);

      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML =
        '<span class="log-time">' + entry.time + '</span> ' +
        '<span class="log-type ' + type + '">[' + type.toUpperCase() + ']</span> ' +
        '<span class="log-url">' + escapeHtml(title) + '</span>' +
        (body ? '<div class="log-body">' + escapeHtml(truncate(body, 3000)) + '</div>' : '');
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;
      document.getElementById('log-count').textContent = entryCount + ' entries';
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function truncate(s, max) {
      if (!s) return '';
      if (typeof s !== 'string') {
        try { s = JSON.stringify(s, null, 2); } catch(e) { s = String(s); }
      }
      return s.length > max ? s.substring(0, max) + '\n... [TRUNCATED]' : s;
    }

    function tryParseJSON(s) {
      try {
        const obj = JSON.parse(s);
        return JSON.stringify(obj, null, 2);
      } catch(e) {
        return s;
      }
    }

    function clearLog() {
      panel.innerHTML = '';
      logEntries.length = 0;
      entryCount = 0;
      document.getElementById('log-count').textContent = '0 entries';
    }

    function copyLog() {
      const text = logEntries.map(e =>
        e.time + ' [' + e.type.toUpperCase() + '] ' + e.title + (e.body ? '\n' + e.body : '')
      ).join('\n\n');
      navigator.clipboard.writeText(text).then(() => addLog('info', 'Copied to clipboard', null));
    }

    function downloadLog() {
      const text = logEntries.map(e =>
        e.time + ' [' + e.type.toUpperCase() + '] ' + e.title + (e.body ? '\n' + e.body : '')
      ).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'zoho-debug-' + new Date().toISOString().replace(/[:.]/g, '-') + '.txt';
      a.click();
    }

    // --- Intercept fetch() ---
    const origFetch = window.fetch;
    window.fetch = function(input, init) {
      const url = typeof input === 'string' ? input : (input.url || String(input));
      const method = (init && init.method) || 'GET';
      let reqBody = (init && init.body) ? String(init.body) : null;

      if (url.includes('zoho') || url.includes('salesiq') || url.includes('livedesk')) {
        addLog('req', method + ' ' + url, reqBody ? tryParseJSON(reqBody) : null);

        return origFetch.apply(this, arguments).then(response => {
          const clone = response.clone();
          clone.text().then(text => {
            addLog('res', response.status + ' ' + url, tryParseJSON(text));
          }).catch(() => {});
          return response;
        }).catch(err => {
          addLog('err', 'FETCH ERROR ' + url, err.message);
          throw err;
        });
      }
      return origFetch.apply(this, arguments);
    };

    // --- Intercept XMLHttpRequest ---
    const origXHROpen = XMLHttpRequest.prototype.open;
    const origXHRSend = XMLHttpRequest.prototype.send;

    XMLHttpRequest.prototype.open = function(method, url) {
      this._debugMethod = method;
      this._debugUrl = url;
      return origXHROpen.apply(this, arguments);
    };

    XMLHttpRequest.prototype.send = function(body) {
      const url = this._debugUrl || '';
      const method = this._debugMethod || 'GET';

      if (url.includes('zoho') || url.includes('salesiq') || url.includes('livedesk')) {
        addLog('req', method + ' ' + url, body ? tryParseJSON(String(body)) : null);

        this.addEventListener('load', function() {
          addLog('res', this.status + ' ' + url, tryParseJSON(this.responseText));
        });
        this.addEventListener('error', function() {
          addLog('err', 'XHR ERROR ' + url, null);
        });
      }
      return origXHRSend.apply(this, arguments);
    };

    // --- Intercept WebSocket ---
    const OrigWebSocket = window.WebSocket;
    window.WebSocket = function(url, protocols) {
      addLog('info', 'WebSocket CONNECT: ' + url, null);

      const ws = protocols ? new OrigWebSocket(url, protocols) : new OrigWebSocket(url);

      const origSend = ws.send.bind(ws);
      ws.send = function(data) {
        addLog('ws-out', 'WS SEND', tryParseJSON(String(data)));
        return origSend(data);
      };

      ws.addEventListener('message', function(event) {
        addLog('ws-in', 'WS RECV', tryParseJSON(String(event.data)));
      });

      ws.addEventListener('close', function(event) {
        addLog('info', 'WebSocket CLOSED (code=' + event.code + ')', null);
      });

      ws.addEventListener('error', function() {
        addLog('err', 'WebSocket ERROR', null);
      });

      return ws;
    };
    window.WebSocket.prototype = OrigWebSocket.prototype;
    window.WebSocket.CONNECTING = OrigWebSocket.CONNECTING;
    window.WebSocket.OPEN = OrigWebSocket.OPEN;
    window.WebSocket.CLOSING = OrigWebSocket.CLOSING;
    window.WebSocket.CLOSED = OrigWebSocket.CLOSED;

    // --- Log browser language info ---
    addLog('info', 'Browser language: ' + navigator.language + ' | Languages: ' + navigator.languages.join(', '), null);
    addLog('info', 'HTML lang: ' + document.documentElement.lang, null);

  </script>

  <!-- Zoho SalesIQ widget AFTER interceptors are in place -->
  <script>
    window.$zoho = window.$zoho || {};
    $zoho.salesiq = $zoho.salesiq || {
      ready: function() {
        $zoho.salesiq.language("es");
        addLog('info', '$zoho.salesiq.language("es") called in ready()', null);
      }
    };
  </script>
  <script id="zsiqscript" src="https://salesiq.zohopublic.eu/widget?wc=siqe2b7a86f214a6c7467c4307bdfacf2889901dea2fdbd020d28f303bee27b360f" defer></script>
</body>
</html>
